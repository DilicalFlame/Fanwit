name: Performance regression
description: Report slowdowns, high resource usage, or startup delays.
title: "[Performance]: "
labels:
  - performance
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Performance reports are most useful with before/after comparisons and measurable data.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the slowdown or resource issue.
    validations:
      required: true

  - type: textarea
    id: measurement
    attributes:
      label: Measurements
      description: Share timing, CPU, memory, or I/O metrics.
      placeholder: |
        Before:
        After:
        Measurement method:
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: Reproduction scenario
      description: What workload or actions trigger the issue?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        App version:
        OS and version:
        Device/CPU/RAM:
        Build type (debug/release):
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I can reproduce this on the latest version.
          required: true
        - label: I included objective measurements, not only subjective observations.
          required: true
